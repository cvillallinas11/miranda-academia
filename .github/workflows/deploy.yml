name: Deploy Miranda Academia to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          for file in serve.js app.js auth.js; do
            node -c "$file" && echo "✅ $file syntax OK" || exit 1
          done

      - name: Smoke test (local server)
        run: |
          timeout 5 node serve.js &
          sleep 2
          curl -fsS http://127.0.0.1:5183/ > /dev/null && echo "✅ Server OK" || echo "⚠️ Server not responding"
          pkill -f "node serve.js" || true

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} <<'EOSSH'
          set -e
          cd /opt/apps/stable-stars
          echo "📦 Fetching latest code..."
          git fetch origin main
          git reset --hard origin/main

          echo "🔧 Ensuring data directory permissions..."
          mkdir -p data
          if [ -w data ]; then
            chown -R 1001:1001 data || sudo -n chown -R 1001:1001 data || true
          fi

          echo "🐳 Building and starting containers..."
          docker compose pull --ignore-pull-failures || true
          docker compose up -d --build --remove-orphans

          echo "⏳ Waiting for app to be ready..."
          sleep 3

          echo "✅ Deployment complete"
          EOSSH

      - name: Verify deployment
        run: |
          sleep 2
          CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://miranda.vortex-company.tech)
          echo "HTTP response: $CODE"
          if [[ "$CODE" == "200" ]]; then
            echo "✅ Miranda Academia responding OK"
          else
            echo "⚠️ Status: $CODE (may be loading)"
          fi
